<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Ponto Utilizado - Fortinet</title>
    <link rel="stylesheet" href="/static/claro.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="header-left">
                <img src="{{ url_for('static', filename='claro_empresasII.jpg') }}" alt="Claro Empresas" class="logo">
                <h1>Novo Ponto Utilizado</h1>
            </div>
            <nav>
                <a href="{{ url_for('dashboard') }}">Dashboard</a>
                <a href="{{ url_for('listar_pontos_bolsao') }}">Pontos Bolsão</a>
                <a href="{{ url_for('listar_pontos_utilizados') }}">Pontos Utilizados</a>
                <a href="{{ url_for('conciliacao') }}">Conciliação</a>
                <a href="{{ url_for('logout') }}" style="background:#2f3941;">Sair</a>
            </nav>
        </header>
        <div class="form-content">
            <form method="post">
                <div class="section">
                    <div class="section-title"><span class="section-number">1</span>Dados de Consumo</div>
                    <div class="form-group">
                        <label for="bolsao_id">Bolsão (Point Pack)</label>
                        <select name="bolsao_id" required>
                            <option value="" disabled selected>Selecione...</option>
                            {% for b in bolsoes %}
                            <option value="{{ b.id }}">{{ b.responsavel }} ({{ b.projetos }})</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="serial_number">Serial</label>
                        <input type="text" name="serial_number" required>
                    </div>
                    <div class="form-group">
                        <label for="dados_cliente">Dados do Cliente</label>
                        <input type="text" name="dados_cliente">
                    </div>
                    <div class="form-group">
                        <label for="product_model">Modelo do Produto</label>
                        <input type="text" name="product_model">
                    </div>
                    <div class="grid-2">
                        <div class="form-group">
                            <label for="valor_pontos_dia">Valor Pontos Dia</label>
                            <input type="number" step="0.01" name="valor_pontos_dia" required>
                        </div>
                        <div class="form-group">
                            <label for="data_aplicacao">Data Aplicação</label>
                            <input type="date" name="data_aplicacao" id="data_aplicacao" required>
                            <small style="color:#666;font-size:12px;margin-top:4px;display:block;">Formato: AAAA-MM-DD</small>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="data_fim">Data Fim (opcional)</label>
                        <input type="date" name="data_fim" id="data_fim">
                        <small style="color:#666;font-size:12px;margin-top:4px;display:block;">Se preenchida, deve ser posterior à Data Aplicação</small>
                    </div>
                </div>
                <button type="submit" class="btn-submit">Salvar Consumo</button>
            </form>
        </div>
        <footer>
            <p>Sistema de Controle de Licenças Fortinet</p>
        </footer>
    </div>
    <script>
        function validatePontoUtilizadoDates() {
            var aplDate = document.getElementById('data_aplicacao').value;
            var fimDate = document.getElementById('data_fim').value;

            if (!aplDate) {
                return true; // Validação padrão do HTML5 vai cuidar
            }

            var apl = new Date(aplDate);
            
            // Validar ano realista (2020-2030)
            if (apl.getFullYear() < 2020 || apl.getFullYear() > 2030) {
                alert('Ano da Data Aplicação deve estar entre 2020 e 2030.');
                return false;
            }

            // Se data_fim foi preenchida, validar
            if (fimDate) {
                var fim = new Date(fimDate);
                
                if (fim.getFullYear() < 2020 || fim.getFullYear() > 2030) {
                    alert('Ano da Data Fim deve estar entre 2020 e 2030.');
                    return false;
                }
                
                if (fim <= apl) {
                    alert('Data Fim deve ser posterior à Data Aplicação!');
                    return false;
                }
            }

            return true;
        }

        // Validar ao submeter formulário
        document.querySelector('form').addEventListener('submit', function(e) {
            if (!validatePontoUtilizadoDates()) {
                e.preventDefault();
            }
        });
    </script>
</body>
</html>
