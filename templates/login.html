<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Controle de Licenças Fortinet</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='claro.css') }}">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #f3f6f5;
        }
        .login-box {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 6px 24px rgba(22,24,26,0.10);
            padding: 48px 40px 40px 40px;
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .login-box img {
            height: 64px;
            margin-bottom: 28px;
        }
        .login-box h2 {
            font-size: 18px;
            color: #1f2933;
            margin-bottom: 28px;
            font-weight: 700;
            text-align: center;
        }
        .login-box .form-group {
            width: 100%;
            margin-bottom: 16px;
        }
        .login-box .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 700;
            color: #37424b;
            font-size: 14px;
        }
        .login-box .form-group input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #dfe6ea;
            border-radius: 8px;
            font-size: 15px;
            box-sizing: border-box;
        }
        .login-box .btn-login {
            width: 100%;
            padding: 12px;
            background: #e60012;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 8px;
        }
        .login-box .btn-login:hover {
            filter: brightness(0.92);
        }
        .login-erro {
            background: #fdecea;
            color: #b71c1c;
            border: 1px solid #f5c6c6;
            border-radius: 8px;
            padding: 10px 14px;
            margin-bottom: 16px;
            font-size: 14px;
            font-weight: 600;
            width: 100%;
            box-sizing: border-box;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <img src="{{ url_for('static', filename='claro_empresas2.jpg') }}" alt="Claro Empresas">
        <h2>Controle de Licenças Fortinet</h2>
        {% if erro %}
        <div class="login-erro">{{ erro }}</div>
        {% endif %}
        <form method="post" style="width:100%;">
            <div class="form-group">
                <label for="usuario">Usuário</label>
                <input type="text" name="usuario" id="usuario" required autofocus>
            </div>
            <div class="form-group">
                <label for="senha">Senha</label>
                <input type="password" name="senha" id="senha" required>
            </div>
            <button type="submit" class="btn-login">Entrar</button>
        </form>
    </div>
</body>
</html>
